name: Release Plugin

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Archive plugin
      run: |
        # Definir el nombre del directorio final
        PLUGIN_SLUG="braveschat"

        # Crear directorio temporal para la estructura
        mkdir -p dist/$PLUGIN_SLUG

        # Copiar todos los archivos excepto los ignorados a la carpeta del plugin
        rsync -av --progress ./ dist/$PLUGIN_SLUG/ \
          --exclude dist \
          --exclude .git \
          --exclude .github \
          --exclude .gitignore \
          --exclude .gitattributes \
          --exclude .distignore \
          --exclude .DS_Store \
          --exclude .agents \
          --exclude .claude \
          --exclude "*.zip" \
          --exclude "node_modules" \
          --exclude "tests" \
          --exclude "CLAUDE.md" \
          --exclude "GEMINI.md" \
          --exclude "UX-UI-Convenciones.md" \
          --exclude "WORDPRESS_ORG_PLAN.md" \
          --exclude "errores.md" \
          --exclude "memory" \
          --exclude "*.bak"

        # Renombrar el archivo principal para coincidir con el slug
        mv dist/$PLUGIN_SLUG/braves_chat.php dist/$PLUGIN_SLUG/$PLUGIN_SLUG.php

        # Crear el zip
        cd dist
        zip -r ../$PLUGIN_SLUG.zip $PLUGIN_SLUG

    - name: Upload Release Asset
      run: gh release upload "${{ github.ref_name }}" braves-chat.zip --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
